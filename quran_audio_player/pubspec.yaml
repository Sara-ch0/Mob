name: quran_audio_player
description: Secure Quran Audio Player with Biometric Auth and Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Biometric ─────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Audio ─────────────────────────────────────────────
  just_audio: ^0.9.40
  audio_service: ^0.18.14

  # ── Network ───────────────────────────────────────────
  http: ^1.2.2

  # ── Local storage ─────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Charts ────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── UI ────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # ── State management ──────────────────────────────────────
  provider: ^6.1.2

  # ── Notifications ─────────────────────────────────────────
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4

  # ── Downloads ─────────────────────────────────────────────
  dio: ^5.7.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
